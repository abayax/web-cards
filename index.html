<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish Word Cards</title>

  <style>
    :root {
      --bg:       #FFF8F0;
      --card:     #FFFFFF;
      --primary:  #5B8DEF;
      --spanish:  #2D3A8C;
      --en-color: #2196F3;
      --zh-color: #E53935;
      --green:    #43A047;
      --text:     #333333;
      --muted:    #999999;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── LIST VIEW ─────────────────────────────────────── */
    #view-list {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .app-header { margin-bottom: 28px; }
    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .app-header h1 { font-size: 1.9rem; font-weight: 800; color: var(--spanish); flex: 1; text-align: center; }
    .app-header p  { color: var(--muted); margin-top: 6px; font-size: 0.95rem; text-align: center; }

    .btn-edit-toggle {
      background: none;
      border: 2px solid var(--muted);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-edit-toggle.active { border-color: #FF7043; color: #FF7043; }

    #search {
      width: 100%;
      padding: 13px 18px;
      font-size: 1rem;
      border: 2px solid #E0E0E0;
      border-radius: var(--radius);
      margin-bottom: 12px;
      outline: none;
      background: white;
      transition: border-color 0.2s;
    }
    #search:focus { border-color: var(--primary); }

    .list-header {
      display: grid;
      grid-template-columns: 2rem 2fr 2fr 1.5fr;
      padding: 0 20px 8px;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .list-header.edit-mode { grid-template-columns: 36px 2fr 2fr 1.5fr; }

    .word-list { display: flex; flex-direction: column; gap: 8px; }

    .word-row {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 20px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 2rem 2fr 2fr 1.5fr;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 2px solid transparent;
      transition: box-shadow 0.18s, border-color 0.18s, transform 0.12s;
    }
    .word-row:hover { box-shadow: 0 4px 18px rgba(91,141,239,0.18); border-color: var(--primary); transform: translateY(-1px); }
    .word-row.edit-mode { grid-template-columns: 36px 2rem 2fr 2fr 1.5fr; cursor: default; }
    .word-row.edit-mode:hover { transform: none; border-color: transparent; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

    .word-row .col-es { font-size: 1.1rem; font-weight: 700; color: var(--spanish); }
    .word-row .col-en { font-size: 0.95rem; color: var(--text); }
    .word-row .col-zh { font-size: 1rem; color: var(--muted); }

    .btn-delete {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #EF5350;
      border: none;
      color: white;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #C62828; }

    .edit-actions {
      display: flex;
      gap: 10px;
      padding: 16px 0 0;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-add-word {
      padding: 13px 24px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 99px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-export {
      padding: 13px 24px;
      background: none;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: 99px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .no-results { text-align: center; color: var(--muted); padding: 40px; font-size: 1.05rem; }

    /* ── FLASHCARD VIEW ────────────────────────────────── */
    #view-card {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .card-topbar { padding: 16px 20px; flex-shrink: 0; }

    .btn-back {
      background: none;
      border: 2px solid var(--primary);
      color: var(--primary);
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back:hover { background: var(--primary); color: white; }

    .card-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      gap: 40px;
    }

    .card-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 14px; }

    .word-spanish {
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 900;
      color: var(--spanish);
      line-height: 1.05;
      word-break: break-word;
    }

    .word-sample { font-size: 1.05rem; color: var(--muted); font-style: italic; line-height: 1.5; }

    .card-right { font-size: clamp(5rem, 14vw, 9rem); line-height: 1; flex-shrink: 0; user-select: none; }

    .card-bottom { flex-shrink: 0; padding: 12px 24px 28px; display: flex; flex-direction: column; gap: 10px; }

    .def-panel {
      border-radius: 12px;
      padding: 14px 16px;
      display: none;
      align-items: flex-start;
      gap: 12px;
    }
    .def-panel.active { display: flex; }
    .def-panel.en-panel { background: #EEF3FF; }
    .def-panel.zh-panel { background: #FFF0F0; }

    .def-text { flex: 1; font-size: 0.95rem; line-height: 1.55; color: var(--text); }
    .def-text .def-word { display: block; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }

    .btn-row { display: flex; gap: 10px; align-items: center; justify-content: center; }

    .btn-lang {
      padding: 13px 26px;
      border-radius: 99px;
      border: none;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-lang:active { transform: scale(0.95); }
    .btn-en { background: var(--en-color); color: white; }
    .btn-zh { background: var(--zh-color); color: white; }
    .btn-lang.on { outline: 3px solid #222; outline-offset: 2px; }

    .mouth-btn {
      border: none; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0; flex-shrink: 0;
      transition: transform 0.1s;
    }
    .mouth-btn:active { transform: scale(0.91); }
    .mouth-btn-es { width: 58px; height: 58px; background: var(--primary); }
    .mouth-btn-en { width: 40px; height: 40px; background: var(--en-color); }
    .mouth-btn-zh { width: 40px; height: 40px; background: var(--zh-color); }

    .mouth { overflow: visible; }
    .m-upper { fill: rgba(255,255,255,0.9); }
    .m-lower { fill: rgba(255,255,255,0.75); transform-origin: 25px 18px; }
    .mouth-btn.speaking .m-lower { animation: lip 0.22s ease-in-out infinite alternate; }
    @keyframes lip { from { transform: scaleY(1); } to { transform: scaleY(2.8); } }

    /* ── ADD WORD VIEW ─────────────────────────────────── */
    #view-add {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .add-topbar {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid #EEE;
      background: white;
    }
    .add-topbar h2 { font-size: 1.1rem; font-weight: 800; color: var(--spanish); }

    .add-form {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .form-input {
      padding: 13px 15px;
      font-size: 1rem;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      outline: none;
      background: white;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }
    .form-input:focus { border-color: var(--primary); }
    .form-input.auto-filled { border-color: #66BB6A; background: #F1F8F1; }
    .form-input.error { border-color: var(--zh-color); }

    .english-row { display: flex; gap: 10px; }
    .english-row .form-input { flex: 1; }

    .btn-lookup {
      padding: 13px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .btn-lookup:disabled { opacity: 0.5; cursor: default; }

    .status-msg { font-size: 0.85rem; text-align: center; min-height: 18px; color: var(--muted); }
    .status-msg.ok    { color: var(--green); }
    .status-msg.error { color: var(--zh-color); }

    .add-footer {
      padding: 16px 20px 32px;
      background: white;
      border-top: 1px solid #EEE;
      max-width: 560px;
      margin: 0 auto;
      width: 100%;
    }

    .btn-save {
      width: 100%;
      padding: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:disabled { opacity: 0.4; cursor: default; }

    .emoji-row { display: flex; gap: 8px; align-items: center; }
    .emoji-row .form-input { flex: 1; font-size: 1.4rem; text-align: center; }

    .btn-emoji-pick {
      padding: 13px 14px;
      background: #F5F5F5;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .btn-emoji-pick:hover { border-color: var(--primary); }

    .ep-wrap {
      display: none;
      background: white;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      overflow: hidden;
    }
    .ep-wrap.open { display: flex; flex-direction: column; }

    .ep-search-row {
      padding: 8px;
      border-bottom: 1px solid #EEE;
    }
    .ep-search-input {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .ep-search-input:focus { border-color: var(--primary); }

    .ep-cats {
      display: flex;
      gap: 2px;
      padding: 6px 8px;
      border-bottom: 1px solid #EEE;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .ep-cats::-webkit-scrollbar { display: none; }
    .ep-cat {
      padding: 4px 8px;
      border: none;
      background: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .ep-cat:hover  { background: #F0F0F0; }
    .ep-cat.active { background: #E3EAFF; }

    .ep-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    .ep-emoji {
      font-size: 1.5rem;
      padding: 5px;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.1s;
    }
    .ep-emoji:hover { background: #F0F0F0; }
    .ep-empty { padding: 16px; color: var(--muted); font-size: 0.9rem; width: 100%; text-align: center; }
  </style>
</head>
<body>

<!-- ═══════════════ LIST VIEW ═══════════════ -->
<div id="view-list">
  <div class="app-header">
    <div class="app-title-row">
      <div style="width:58px"></div>
      <h1>🌟 Spanish Word Cards</h1>
      <button class="btn-edit-toggle" id="btn-edit-toggle">Edit</button>
    </div>
    <p>Tap any word to open its flashcard</p>
  </div>

  <input id="search" type="search" placeholder="🔍  Search in Spanish, English, or 中文…" autocomplete="off">

  <div class="list-header" id="list-header">
    <span>Spanish</span>
    <span>English</span>
    <span>中文</span>
  </div>

  <div class="word-list" id="word-list"></div>

  <div class="edit-actions" id="edit-actions" style="display:none">
    <button class="btn-add-word" id="btn-add-word">+ Add Word</button>
    <button class="btn-export"   id="btn-export">Export data.js</button>
  </div>
</div>

<!-- ═══════════════ FLASHCARD VIEW ═══════════════ -->
<div id="view-card">
  <div class="card-topbar">
    <button class="btn-back" id="btn-back">← Back</button>
  </div>
  <div class="card-main">
    <div class="card-left">
      <div class="word-spanish" id="card-spanish"></div>
      <div class="word-sample"  id="card-sample"></div>
    </div>
    <div class="card-right" id="card-emoji"></div>
  </div>
  <div class="card-bottom">
    <div class="def-panel en-panel" id="panel-en">
      <div class="def-text" id="text-en"></div>
      <button class="mouth-btn mouth-btn-en" id="btn-say-en" title="Hear English">
        <svg class="mouth" width="22" height="14" viewBox="0 0 50 30">
          <path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/>
          <path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/>
        </svg>
      </button>
    </div>
    <div class="def-panel zh-panel" id="panel-zh">
      <div class="def-text" id="text-zh"></div>
      <button class="mouth-btn mouth-btn-zh" id="btn-say-zh" title="Hear Chinese">
        <svg class="mouth" width="22" height="14" viewBox="0 0 50 30">
          <path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/>
          <path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/>
        </svg>
      </button>
    </div>
    <div class="btn-row">
      <button class="mouth-btn mouth-btn-es" id="btn-say-es" title="Hear Spanish">
        <svg class="mouth" width="30" height="18" viewBox="0 0 50 30">
          <path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/>
          <path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/>
        </svg>
      </button>
      <button class="btn-lang btn-en" id="btn-toggle-en">English</button>
      <button class="btn-lang btn-zh" id="btn-toggle-zh">中文</button>
    </div>
  </div>
</div>

<!-- ═══════════════ ADD WORD VIEW ═══════════════ -->
<div id="view-add">
  <div class="add-topbar">
    <button class="btn-back" id="btn-add-cancel">← Cancel</button>
    <h2>Add New Word</h2>
    <div style="width:70px"></div>
  </div>

  <div class="add-form">
    <div class="form-group">
      <label>English Word</label>
      <div class="english-row">
        <input class="form-input" id="input-english" type="text" placeholder="e.g. butterfly" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn-lookup" id="btn-lookup">Look Up</button>
      </div>
    </div>

    <div id="add-status" class="status-msg"></div>

    <div class="form-group">
      <label>Spanish</label>
      <input class="form-input" id="input-spanish" type="text" placeholder="mariposa" autocorrect="off" autocapitalize="none">
    </div>

    <div class="form-group">
      <label>Chinese 中文</label>
      <input class="form-input" id="input-chinese" type="text" placeholder="蝴蝶">
    </div>

    <div class="form-group">
      <label>English Definition</label>
      <input class="form-input" id="input-definition" type="text" placeholder="A flying insect with colorful wings.">
    </div>

    <div class="form-group">
      <label>Emoji</label>
      <div class="emoji-row">
        <input class="form-input" id="input-emoji" type="text" placeholder="🦋" maxlength="4">
        <button class="btn-emoji-pick" id="btn-emoji-pick" type="button" title="Pick emoji">😊</button>
      </div>
      <div class="ep-wrap" id="ep-wrap">
        <div class="ep-search-row">
          <input class="ep-search-input" id="ep-search" type="text" placeholder="Search…" autocomplete="off">
        </div>
        <div class="ep-cats" id="ep-cats"></div>
        <div class="ep-grid" id="ep-grid"></div>
      </div>
    </div>
  </div>

  <div class="add-footer">
    <button class="btn-save" id="btn-save-word">Save Word</button>
  </div>
</div>

<script src="data.js"></script>
<script>
// ─────────────────────────────────────────────
//  Data management (localStorage overlay)
// ─────────────────────────────────────────────
const LS_ADDED   = 'wc_added';
const LS_DELETED = 'wc_deleted';

function getAdded()   { return JSON.parse(localStorage.getItem(LS_ADDED)   || '[]'); }
function getDeleted() { return JSON.parse(localStorage.getItem(LS_DELETED) || '[]'); }

function getAllWords() {
  const base    = (typeof WORD_DATA !== 'undefined') ? WORD_DATA : [];
  const added   = getAdded();
  const deleted = getDeleted();
  return [...base, ...added].filter(w => !deleted.includes(w.english.toLowerCase()));
}

function deleteWord(english) {
  const deleted = getDeleted();
  const key = english.toLowerCase();
  if (!deleted.includes(key)) {
    deleted.push(key);
    localStorage.setItem(LS_DELETED, JSON.stringify(deleted));
  }
}

function saveAddedWord(word) {
  const added = getAdded();
  added.push(word);
  localStorage.setItem(LS_ADDED, JSON.stringify(added));
}

// ─────────────────────────────────────────────
//  External APIs
// ─────────────────────────────────────────────
async function translateWord(text, targetLang) {
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('Translation failed');
  const data = await resp.json();
  return data[0].map(item => item[0]).join('');
}

async function lookupDictionary(word) {
  const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`);
  if (!resp.ok) return { definition: '', audioUrl: '' };
  const data  = await resp.json();
  const entry = data[0];
  const meaning = entry.meanings?.find(m => m.partOfSpeech === 'noun') || entry.meanings?.[0];
  const definition = meaning?.definitions?.[0]?.definition || '';
  const audioUrl   = entry.phonetics?.find(p => p.audio?.startsWith('http'))?.audio || '';
  return { definition, audioUrl };
}

// ─────────────────────────────────────────────
//  Speech
// ─────────────────────────────────────────────
function speak(text, lang, btn) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.85;
  const allBtns = document.querySelectorAll('.mouth-btn');
  utter.onstart = () => { allBtns.forEach(b => b.classList.remove('speaking')); if (btn) btn.classList.add('speaking'); };
  utter.onend = utter.onerror = () => allBtns.forEach(b => b.classList.remove('speaking'));
  speechSynthesis.speak(utter);
}

function speakWithUrl(audioUrl, fallbackText, fallbackLang, btn) {
  if (audioUrl) {
    document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
    if (btn) btn.classList.add('speaking');
    const audio = new Audio(audioUrl);
    audio.onended = audio.onerror = () => document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
    audio.play().catch(() => speak(fallbackText, fallbackLang, btn));
  } else {
    speak(fallbackText, fallbackLang, btn);
  }
}

// ─────────────────────────────────────────────
//  List view
// ─────────────────────────────────────────────
let editMode = false;

function renderList(query) {
  const q         = (query || document.getElementById('search').value || '').toLowerCase().trim();
  const container = document.getElementById('word-list');
  const header    = document.getElementById('list-header');
  const words     = getAllWords();

  header.className = editMode ? 'list-header edit-mode' : 'list-header';
  if (editMode) header.innerHTML = '<span></span><span></span><span>Spanish</span><span>English</span><span>中文</span>';
  else          header.innerHTML = '<span></span><span>Spanish</span><span>English</span><span>中文</span>';

  const filtered = words.filter(w =>
    !q ||
    w.spanish.toLowerCase().includes(q) ||
    w.english.toLowerCase().includes(q) ||
    w.chinese.includes(q)
  );

  if (!filtered.length) {
    container.innerHTML = '<div class="no-results">No words found 🔍</div>';
    return;
  }

  container.innerHTML = filtered.map(w => {
    const idx   = words.indexOf(w);
    const emoji = w.emoji || '📖';
    if (editMode) {
      return `<div class="word-row edit-mode" data-idx="${idx}">
        <button class="btn-delete" data-english="${w.english}" title="Delete">×</button>
        <span style="font-size:1.3rem">${emoji}</span>
        <span class="col-es">${w.spanish}</span>
        <span class="col-en">${w.english}</span>
        <span class="col-zh">${w.chinese}</span>
      </div>`;
    }
    return `<div class="word-row" data-idx="${idx}">
      <span style="font-size:1.3rem">${emoji}</span>
      <span class="col-es">${w.spanish}</span>
      <span class="col-en">${w.english}</span>
      <span class="col-zh">${w.chinese}</span>
    </div>`;
  }).join('');

  if (editMode) {
    container.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm(`Delete "${btn.dataset.english}"?`)) {
          deleteWord(btn.dataset.english);
          renderList();
        }
      });
    });
  } else {
    container.querySelectorAll('.word-row').forEach(row => {
      row.addEventListener('click', () => showCard(+row.dataset.idx));
    });
  }
}

function toggleEditMode() {
  editMode = !editMode;
  const btn     = document.getElementById('btn-edit-toggle');
  const actions = document.getElementById('edit-actions');
  btn.textContent = editMode ? 'Done' : 'Edit';
  btn.classList.toggle('active', editMode);
  actions.style.display = editMode ? 'flex' : 'none';
  document.getElementById('search').disabled = editMode;
  renderList();
}

// ─────────────────────────────────────────────
//  Flashcard view
// ─────────────────────────────────────────────
let current = null;

function showCard(idx) {
  const words = getAllWords();
  current = words[idx];

  document.getElementById('card-spanish').textContent = current.spanish;
  document.getElementById('card-emoji').textContent   = current.emoji || '📖';

  const sampleEl = document.getElementById('card-sample');
  sampleEl.textContent = current.sample_sentence || '';
  sampleEl.style.display = current.sample_sentence ? 'block' : 'none';

  document.getElementById('text-en').innerHTML =
    `<span class="def-word">${current.english}</span>${current.definition || ''}`;
  document.getElementById('text-zh').innerHTML =
    `<span class="def-word">${current.chinese}</span>`;

  ['panel-en','panel-zh'].forEach(id => document.getElementById(id).classList.remove('active'));
  ['btn-toggle-en','btn-toggle-zh'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
  speechSynthesis.cancel();

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-card').style.display = 'flex';
}

function showList() {
  speechSynthesis.cancel();
  document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
  document.getElementById('view-card').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
}

function togglePanel(panelId, btnId, otherPanelId, otherBtnId) {
  const isOn = document.getElementById(panelId).classList.contains('active');
  document.getElementById(otherPanelId).classList.remove('active');
  document.getElementById(otherBtnId).classList.remove('on');
  document.getElementById(panelId).classList.toggle('active', !isOn);
  document.getElementById(btnId).classList.toggle('on', !isOn);
}

// ─────────────────────────────────────────────
//  Add word view
// ─────────────────────────────────────────────
let pendingAudioUrl = '';

function showAddView() {
  ['input-english','input-spanish','input-chinese','input-definition','input-emoji']
    .forEach(id => { document.getElementById(id).value = ''; document.getElementById(id).classList.remove('auto-filled','error'); });
  const status = document.getElementById('add-status');
  status.textContent = '';
  status.className = 'status-msg';
  pendingAudioUrl = '';

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-add').style.display  = 'flex';
  setTimeout(() => document.getElementById('input-english').focus(), 100);
}

function hideAddView() {
  document.getElementById('view-add').style.display  = 'none';
  document.getElementById('view-list').style.display = 'block';
}

async function doLookup() {
  const english = document.getElementById('input-english').value.trim();
  if (!english) {
    document.getElementById('input-english').classList.add('error');
    return;
  }
  document.getElementById('input-english').classList.remove('error');

  const btn    = document.getElementById('btn-lookup');
  const status = document.getElementById('add-status');
  btn.disabled = true;
  btn.textContent = '…';
  status.textContent = 'Looking up…';
  status.className = 'status-msg';

  try {
    const [spanish, chinese, dict] = await Promise.all([
      translateWord(english, 'es'),
      translateWord(english, 'zh-CN'),
      lookupDictionary(english),
    ]);

    document.getElementById('input-spanish').value    = spanish;
    document.getElementById('input-chinese').value    = chinese;
    document.getElementById('input-definition').value = dict.definition;
    pendingAudioUrl = dict.audioUrl;

    ['input-spanish','input-chinese'].forEach(id => document.getElementById(id).classList.add('auto-filled'));
    if (dict.definition) document.getElementById('input-definition').classList.add('auto-filled');

    status.textContent = '✓ Done! Review and adjust if needed.';
    status.className   = 'status-msg ok';
  } catch {
    status.textContent = '✗ Lookup failed — check your connection or fill in manually.';
    status.className   = 'status-msg error';
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Look Up';
  }
}

function doSaveWord() {
  const get = id => document.getElementById(id).value.trim();
  const english    = get('input-english');
  const spanish    = get('input-spanish');
  const chinese    = get('input-chinese');
  const definition = get('input-definition');
  const emoji      = get('input-emoji');

  const status = document.getElementById('add-status');
  if (!english || !spanish || !chinese) {
    status.textContent = 'English, Spanish, and Chinese are required.';
    status.className   = 'status-msg error';
    return;
  }

  saveAddedWord({ english, spanish, chinese, definition, emoji, audio_en_url: pendingAudioUrl });
  hideAddView();
  renderList();
}

// ─────────────────────────────────────────────
//  Export
// ─────────────────────────────────────────────
function exportDataJs() {
  const words   = getAllWords();
  const content = `// Auto-generated — do not edit by hand\nconst WORD_DATA = ${JSON.stringify(words, null, 2)};\n`;
  const blob    = new Blob([content], { type: 'application/javascript' });
  const url     = URL.createObjectURL(blob);
  const a       = Object.assign(document.createElement('a'), { href: url, download: 'data.js' });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

(function initEmojiPicker() {
  const wrap    = document.getElementById('ep-wrap');
  const catBar  = document.getElementById('ep-cats');
  const grid    = document.getElementById('ep-grid');
  const search  = document.getElementById('ep-search');

  // Build category tabs
  const cats = [['all','🌐'], ...Object.entries(EP.data).map(([k]) => [k, k])];
  catBar.innerHTML = cats.map(([k, label]) =>
    `<button class="ep-cat${k==='all'?' active':''}" data-cat="${k}">${label}</button>`
  ).join('');

  function allEntries() { return Object.values(EP.data).flat(); }

  function renderGrid() {
    const q    = search.value.toLowerCase().trim();
    const pool = EP.cat === 'all' ? allEntries() : (EP.data[EP.cat] || []);
    const list = q ? allEntries().filter(([, k]) => k.includes(q)) : pool;
    if (!list.length) { grid.innerHTML = '<div class="ep-empty">No results</div>'; return; }
    grid.innerHTML = list.map(([e]) => `<span class="ep-emoji" data-e="${e}">${e}</span>`).join('');
  }

  catBar.addEventListener('click', e => {
    const btn = e.target.closest('.ep-cat');
    if (!btn) return;
    EP.cat = btn.dataset.cat;
    catBar.querySelectorAll('.ep-cat').forEach(b => b.classList.toggle('active', b === btn));
    search.value = '';
    renderGrid();
  });

  grid.addEventListener('click', e => {
    const el = e.target.closest('.ep-emoji');
    if (!el) return;
    document.getElementById('input-emoji').value = el.dataset.e;
    wrap.classList.remove('open');
  });

  search.addEventListener('input', renderGrid);

  document.getElementById('btn-emoji-pick').addEventListener('click', e => {
    e.stopPropagation();
    const opening = !wrap.classList.contains('open');
    wrap.classList.toggle('open');
    if (opening) { search.value = ''; EP.cat = 'all'; renderGrid(); catBar.querySelector('.ep-cat').classList.add('active'); catBar.querySelectorAll('.ep-cat:not(:first-child)').forEach(b => b.classList.remove('active')); setTimeout(() => search.focus(), 50); }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#ep-wrap') && !e.target.closest('#btn-emoji-pick')) {
      wrap.classList.remove('open');
    }
  });

  renderGrid();
})();
