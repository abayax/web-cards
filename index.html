<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish Word Cards</title>
  <style>
    :root {
      --bg:       #FFF8F0;
      --card:     #FFFFFF;
      --primary:  #5B8DEF;
      --spanish:  #2D3A8C;
      --en-color: #2196F3;
      --zh-color: #E53935;
      --ja-color: #8E24AA;
      --green:    #43A047;
      --text:     #333333;
      --muted:    #999999;
      --radius:   16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── LIST VIEW ───────────────────────────────────────── */
    #view-list { max-width: 760px; margin: 0 auto; padding: 28px 16px 48px; }

    .app-header { margin-bottom: 20px; }
    .app-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .app-header h1 { font-size: 1.9rem; font-weight: 800; color: var(--spanish); flex: 1; text-align: center; }
    .app-header p  { color: var(--muted); margin-top: 6px; font-size: 0.9rem; text-align: center; }

    .btn-edit-toggle { background: none; border: 2px solid var(--muted); color: var(--muted); padding: 6px 14px; border-radius: 99px; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
    .btn-edit-toggle.active { border-color: #FF7043; color: #FF7043; }

    #search { width: 100%; padding: 12px 16px; font-size: 1rem; border: 2px solid #E0E0E0; border-radius: var(--radius); margin: 12px 0 10px; outline: none; background: white; transition: border-color 0.2s; }
    #search:focus { border-color: var(--primary); }

    /* sort controls */
    .sort-row { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }
    .sort-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-right: 2px; white-space: nowrap; }
    .btn-sort { padding: 5px 12px; border-radius: 99px; border: 1.5px solid #DDD; background: white; font-size: 0.8rem; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .btn-sort.active { border-color: var(--primary); background: #EEF3FF; color: var(--primary); }

    /* horizontal-scroll wrapper */
    .list-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius); }
    .list-scroll::-webkit-scrollbar { height: 4px; }
    .list-scroll::-webkit-scrollbar-thumb { background: #DDD; border-radius: 2px; }

    .list-header { display: grid; grid-template-columns: 2rem 2fr 2fr 2fr 2fr; min-width: 480px; padding: 0 16px 6px; gap: 8px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .list-header.edit-mode { grid-template-columns: 36px 2rem 2fr 2fr 2fr 2fr 28px; }

    .word-list { display: flex; flex-direction: column; gap: 8px; min-width: 480px; }

    .word-row { background: var(--card); border-radius: var(--radius); padding: 13px 16px; cursor: pointer; display: grid; grid-template-columns: 2rem 2fr 2fr 2fr 2fr; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.06); border: 2px solid transparent; transition: box-shadow .18s, border-color .18s, transform .1s; }
    .word-row:hover { box-shadow: 0 4px 16px rgba(91,141,239,.18); border-color: var(--primary); transform: translateY(-1px); }
    .word-row.edit-mode { grid-template-columns: 36px 2rem 2fr 2fr 2fr 2fr 28px; cursor: default; }
    .word-row.edit-mode:hover { transform: none; border-color: transparent; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    .word-row.dragging { opacity: .4; }
    .word-row.drag-over { border-color: var(--primary); border-style: dashed; }

    .col-emoji { font-size: 1.3rem; line-height: 1; }
    .col-es { font-size: 1rem; font-weight: 700; color: var(--spanish); }
    .col-en { font-size: 0.9rem; color: var(--text); }
    .col-zh { font-size: 0.9rem; color: var(--muted); }
    .col-ja { font-size: 0.9rem; color: var(--ja-color); }

    .btn-delete { width: 28px; height: 28px; border-radius: 50%; background: #EF5350; border: none; color: white; font-size: 1.1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; flex-shrink: 0; }
    .btn-delete:hover { background: #C62828; }

    .drag-handle { width: 22px; color: #CCC; font-size: 1.1rem; cursor: grab; text-align: center; flex-shrink: 0; touch-action: none; user-select: none; }
    .drag-handle:active { cursor: grabbing; }

    .edit-actions { display: flex; gap: 10px; padding: 14px 0 0; justify-content: center; flex-wrap: wrap; }
    .btn-add-word { padding: 12px 22px; background: var(--green); color: white; border: none; border-radius: 99px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .btn-export   { padding: 12px 22px; background: none; color: var(--primary); border: 2px solid var(--primary); border-radius: 99px; font-size: 1rem; font-weight: 700; cursor: pointer; }

    .no-results { text-align: center; color: var(--muted); padding: 40px; font-size: 1.05rem; }

    /* ── FLASHCARD ───────────────────────────────────────── */
    #view-card { display: none; flex-direction: column; min-height: 100vh; }
    .card-topbar { padding: 16px 20px; flex-shrink: 0; }
    .btn-back { background: none; border: 2px solid var(--primary); color: var(--primary); padding: 8px 18px; border-radius: 99px; font-size: .9rem; font-weight: 700; cursor: pointer; transition: background .15s, color .15s; }
    .btn-back:hover { background: var(--primary); color: white; }

    .card-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px 40px; gap: 40px; }
    .card-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
    .word-spanish { font-size: clamp(2.8rem,7vw,5.5rem); font-weight: 900; color: var(--spanish); line-height: 1.05; word-break: break-word; }
    .card-right { font-size: clamp(4rem,12vw,8rem); line-height: 1; flex-shrink: 0; user-select: none; }

    .card-bottom { flex-shrink: 0; padding: 10px 20px 28px; display: flex; flex-direction: column; gap: 10px; }

    .def-panel { border-radius: 12px; padding: 14px 16px; display: none; align-items: flex-start; gap: 12px; }
    .def-panel.active { display: flex; }
    .def-panel.en-panel { background: #EEF3FF; }
    .def-panel.zh-panel { background: #FFF0F0; }
    .def-panel.ja-panel { background: #F5EEF9; }
    .def-text { flex: 1; font-size: .95rem; line-height: 1.55; color: var(--text); }
    .def-text .def-word { display: block; font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }

    .btn-row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .btn-lang { padding: 12px 20px; border-radius: 99px; border: none; font-size: .95rem; font-weight: 700; cursor: pointer; transition: transform .1s; }
    .btn-lang:active { transform: scale(.95); }
    .btn-en { background: var(--en-color); color: white; }
    .btn-zh { background: var(--zh-color); color: white; }
    .btn-ja { background: var(--ja-color); color: white; }
    .btn-lang.on { outline: 3px solid #222; outline-offset: 2px; }

    .mouth-btn { border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; transition: transform .1s; }
    .mouth-btn:active { transform: scale(.91); }
    .mouth-btn-es { width: 56px; height: 56px; background: var(--primary); }
    .mouth-btn-en { width: 38px; height: 38px; background: var(--en-color); }
    .mouth-btn-zh { width: 38px; height: 38px; background: var(--zh-color); }
    .mouth-btn-ja { width: 38px; height: 38px; background: var(--ja-color); }

    .mouth { overflow: visible; }
    .m-upper { fill: rgba(255,255,255,.9); }
    .m-lower { fill: rgba(255,255,255,.75); transform-origin: 25px 18px; }
    .mouth-btn.speaking .m-lower { animation: lip .22s ease-in-out infinite alternate; }
    @keyframes lip { from { transform: scaleY(1); } to { transform: scaleY(2.8); } }

    /* ── ADD WORD VIEW ───────────────────────────────────── */
    #view-add { display: none; flex-direction: column; min-height: 100vh; }
    .add-topbar { padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; border-bottom: 1px solid #EEE; background: white; }
    .add-topbar h2 { font-size: 1.1rem; font-weight: 800; color: var(--spanish); }

    .add-form { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; max-width: 560px; margin: 0 auto; width: 100%; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .form-input { padding: 12px 14px; font-size: 1rem; border: 2px solid #E0E0E0; border-radius: 12px; outline: none; background: white; transition: border-color .2s, background .2s; width: 100%; }
    .form-input:focus { border-color: var(--primary); }
    .form-input.auto-filled { border-color: #66BB6A; background: #F1F8F1; }
    .form-input.error { border-color: var(--zh-color); }

    .english-row { display: flex; gap: 8px; }
    .english-row .form-input { flex: 1; }
    .btn-lookup { padding: 12px 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: .9rem; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: opacity .15s; }
    .btn-lookup:disabled { opacity: .5; cursor: default; }

    .status-msg { font-size: .85rem; text-align: center; min-height: 18px; color: var(--muted); }
    .status-msg.ok    { color: var(--green); }
    .status-msg.error { color: var(--zh-color); }

    .add-footer { padding: 14px 20px 32px; background: white; border-top: 1px solid #EEE; max-width: 560px; margin: 0 auto; width: 100%; }
    .btn-save { width: 100%; padding: 15px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn-save:disabled { opacity: .4; cursor: default; }

    .emoji-row { display: flex; gap: 8px; align-items: center; }
    .emoji-row .form-input { flex: 1; font-size: 1.4rem; text-align: center; }
    .btn-emoji-pick { padding: 12px 14px; background: #F5F5F5; border: 2px solid #E0E0E0; border-radius: 12px; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; transition: border-color .15s; }
    .btn-emoji-pick:hover { border-color: var(--primary); }

    .ep-wrap { display: none; background: white; border: 2px solid #E0E0E0; border-radius: 12px; overflow: hidden; }
    .ep-wrap.open { display: flex; flex-direction: column; }
    .ep-search-row { padding: 8px; border-bottom: 1px solid #EEE; }
    .ep-search-input { width: 100%; padding: 7px 10px; border: 1.5px solid #E0E0E0; border-radius: 8px; font-size: .9rem; outline: none; }
    .ep-search-input:focus { border-color: var(--primary); }
    .ep-cats { display: flex; gap: 2px; padding: 5px 7px; border-bottom: 1px solid #EEE; overflow-x: auto; scrollbar-width: none; }
    .ep-cats::-webkit-scrollbar { display: none; }
    .ep-cat { padding: 4px 8px; border: none; background: none; border-radius: 6px; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; transition: background .1s; }
    .ep-cat:hover { background: #F0F0F0; }
    .ep-cat.active { background: #E3EAFF; }
    .ep-grid { display: flex; flex-wrap: wrap; gap: 2px; padding: 8px; max-height: 190px; overflow-y: auto; }
    .ep-emoji { font-size: 1.5rem; padding: 5px; border-radius: 6px; cursor: pointer; line-height: 1; transition: background .1s; }
    .ep-emoji:hover { background: #F0F0F0; }
    .ep-empty { padding: 16px; color: var(--muted); font-size: .9rem; width: 100%; text-align: center; }
  </style>
</head>
<body>

<!-- ═══════════════ LIST VIEW ═══════════════ -->
<div id="view-list">
  <div class="app-header">
    <div class="app-title-row">
      <div style="width:58px"></div>
      <h1>🌟 Spanish Word Cards</h1>
      <button class="btn-edit-toggle" id="btn-edit-toggle">Edit</button>
    </div>
    <p>Tap any word to open its flashcard</p>
  </div>

  <input id="search" type="search" placeholder="🔍  Search words…" autocomplete="off">

  <div class="sort-row">
    <span class="sort-label">Sort:</span>
    <button class="btn-sort active" data-sort="default">Default</button>
    <button class="btn-sort" data-sort="az-es">A→Z Spanish</button>
    <button class="btn-sort" data-sort="az-en">A→Z English</button>
    <button class="btn-sort" data-sort="newest">Newest</button>
  </div>

  <div class="list-scroll">
    <div class="list-header" id="list-header">
      <span></span><span>Spanish</span><span>English</span><span>中文</span><span>日本語</span>
    </div>
    <div class="word-list" id="word-list"></div>
  </div>

  <div class="edit-actions" id="edit-actions" style="display:none">
    <button class="btn-add-word" id="btn-add-word">+ Add Word</button>
    <button class="btn-export"   id="btn-export">Export data.js</button>
  </div>
</div>

<!-- ═══════════════ FLASHCARD VIEW ═══════════════ -->
<div id="view-card">
  <div class="card-topbar">
    <button class="btn-back" id="btn-back">← Back</button>
  </div>
  <div class="card-main">
    <div class="card-left">
      <div class="word-spanish" id="card-spanish"></div>
    </div>
    <div class="card-right" id="card-emoji"></div>
  </div>
  <div class="card-bottom">
    <div class="def-panel en-panel" id="panel-en">
      <div class="def-text" id="text-en"></div>
      <button class="mouth-btn mouth-btn-en" id="btn-say-en">
        <svg class="mouth" width="20" height="13" viewBox="0 0 50 30"><path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/><path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/></svg>
      </button>
    </div>
    <div class="def-panel zh-panel" id="panel-zh">
      <div class="def-text" id="text-zh"></div>
      <button class="mouth-btn mouth-btn-zh" id="btn-say-zh">
        <svg class="mouth" width="20" height="13" viewBox="0 0 50 30"><path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/><path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/></svg>
      </button>
    </div>
    <div class="def-panel ja-panel" id="panel-ja">
      <div class="def-text" id="text-ja"></div>
      <button class="mouth-btn mouth-btn-ja" id="btn-say-ja">
        <svg class="mouth" width="20" height="13" viewBox="0 0 50 30"><path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/><path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/></svg>
      </button>
    </div>
    <div class="btn-row">
      <button class="mouth-btn mouth-btn-es" id="btn-say-es">
        <svg class="mouth" width="28" height="17" viewBox="0 0 50 30"><path class="m-upper" d="M5 18 Q12 8 25 14 Q38 8 45 18 Q25 13 5 18Z"/><path class="m-lower" d="M5 18 Q25 27 45 18 Q25 21 5 18Z"/></svg>
      </button>
      <button class="btn-lang btn-en" id="btn-toggle-en">English</button>
      <button class="btn-lang btn-zh" id="btn-toggle-zh">中文</button>
      <button class="btn-lang btn-ja" id="btn-toggle-ja">日本語</button>
    </div>
  </div>
</div>

<!-- ═══════════════ ADD WORD VIEW ═══════════════ -->
<div id="view-add">
  <div class="add-topbar">
    <button class="btn-back" id="btn-add-cancel">← Cancel</button>
    <h2>Add New Word</h2>
    <div style="width:80px"></div>
  </div>
  <div class="add-form">
    <div class="form-group">
      <label>English Word</label>
      <div class="english-row">
        <input class="form-input" id="input-english" type="text" placeholder="e.g. butterfly" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn-lookup" id="btn-lookup">Look Up</button>
      </div>
    </div>
    <div id="add-status" class="status-msg"></div>
    <div class="form-group">
      <label>Spanish</label>
      <input class="form-input" id="input-spanish" type="text" placeholder="mariposa" autocorrect="off" autocapitalize="none">
    </div>
    <div class="form-group">
      <label>Chinese 中文</label>
      <input class="form-input" id="input-chinese" type="text" placeholder="蝴蝶">
    </div>
    <div class="form-group">
      <label>Japanese 日本語</label>
      <input class="form-input" id="input-japanese" type="text" placeholder="蝶々">
    </div>
    <div class="form-group">
      <label>English Definition</label>
      <input class="form-input" id="input-definition" type="text" placeholder="A flying insect with colorful wings.">
    </div>
    <div class="form-group">
      <label>Emoji</label>
      <div class="emoji-row">
        <input class="form-input" id="input-emoji" type="text" placeholder="🦋" maxlength="4">
        <button class="btn-emoji-pick" id="btn-emoji-pick" type="button">😊</button>
      </div>
      <div class="ep-wrap" id="ep-wrap">
        <div class="ep-search-row"><input class="ep-search-input" id="ep-search" type="text" placeholder="Search…" autocomplete="off"></div>
        <div class="ep-cats" id="ep-cats"></div>

      </div>
    </div>
  </div>
  <div class="add-footer">
    <button class="btn-save" id="btn-save-word">Save Word</button>
  </div>
</div>

<script src="data.js"></script>
<script>
// ─────────────────────────────────────────────
//  LocalStorage keys
// ─────────────────────────────────────────────
const LS_ADDED   = 'wc_added';
const LS_DELETED = 'wc_deleted';
const LS_ORDER   = 'wc_order';

function getAdded()   { return JSON.parse(localStorage.getItem(LS_ADDED)   || '[]'); }
function getDeleted() { return JSON.parse(localStorage.getItem(LS_DELETED) || '[]'); }
function getOrder()   { return JSON.parse(localStorage.getItem(LS_ORDER)   || '[]'); }

function getAllWords() {
  const base    = (typeof WORD_DATA !== 'undefined') ? WORD_DATA : [];
  const added   = getAdded();
  const deleted = getDeleted();
  return [...base, ...added].filter(w => !deleted.includes(w.english.toLowerCase()));
}

function deleteWord(english) {
  const deleted = getDeleted();
  const key = english.toLowerCase();
  if (!deleted.includes(key)) { deleted.push(key); localStorage.setItem(LS_DELETED, JSON.stringify(deleted)); }
}

function saveAddedWord(word) {
  const added = getAdded();
  added.push({ ...word, created_at: new Date().toISOString() });
  localStorage.setItem(LS_ADDED, JSON.stringify(added));
}

function saveOrder(keys) { localStorage.setItem(LS_ORDER, JSON.stringify(keys)); }

// ─────────────────────────────────────────────
//  Sort
// ─────────────────────────────────────────────
let sortMode = 'default';

function getSortedWords() {
  let words = getAllWords();
  if (sortMode === 'az-es') {
    words.sort((a, b) => a.spanish.localeCompare(b.spanish));
  } else if (sortMode === 'az-en') {
    words.sort((a, b) => a.english.localeCompare(b.english));
  } else if (sortMode === 'newest') {
    words.sort((a, b) => {
      if (!a.created_at && !b.created_at) return 0;
      if (!a.created_at) return 1;
      if (!b.created_at) return -1;
      return new Date(b.created_at) - new Date(a.created_at);
    });
  } else {
    // default: apply custom order if set
    const order = getOrder();
    if (order.length) {
      const map = Object.fromEntries(order.map((k, i) => [k, i]));
      words.sort((a, b) => (map[a.english.toLowerCase()] ?? 9999) - (map[b.english.toLowerCase()] ?? 9999));
    }
  }
  return words;
}

// ─────────────────────────────────────────────
//  APIs
// ─────────────────────────────────────────────
async function translateWord(text, targetLang) {
  const resp = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`);
  if (!resp.ok) throw new Error('Translation failed');
  const data = await resp.json();
  return data[0].map(item => item[0]).join('');
}

async function lookupDictionary(word) {
  const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`);
  if (!resp.ok) return { definition: '', audioUrl: '' };
  const data  = await resp.json();
  const entry = data[0];
  const meaning   = entry.meanings?.find(m => m.partOfSpeech === 'noun') || entry.meanings?.[0];
  const definition = meaning?.definitions?.[0]?.definition || '';
  const audioUrl   = entry.phonetics?.find(p => p.audio?.startsWith('http'))?.audio || '';
  return { definition, audioUrl };
}

// ─────────────────────────────────────────────
//  Speech
// ─────────────────────────────────────────────
function speak(text, lang, btn) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang;
  utter.rate = 0.85;
  const all = document.querySelectorAll('.mouth-btn');
  utter.onstart = () => { all.forEach(b => b.classList.remove('speaking')); if (btn) btn.classList.add('speaking'); };
  utter.onend = utter.onerror = () => all.forEach(b => b.classList.remove('speaking'));
  speechSynthesis.speak(utter);
}

function speakWithUrl(audioUrl, fallbackText, fallbackLang, btn) {
  if (audioUrl) {
    document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
    if (btn) btn.classList.add('speaking');
    const audio = new Audio(audioUrl);
    audio.onended = audio.onerror = () => document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
    audio.play().catch(() => speak(fallbackText, fallbackLang, btn));
  } else {
    speak(fallbackText, fallbackLang, btn);
  }
}

// ─────────────────────────────────────────────
//  Drag & drop (desktop + touch)
// ─────────────────────────────────────────────
let dragEl = null, touchDropTarget = null;

function reorderWords(fromEnglish, toEnglish) {
  const words = getAllWords();
  const order = words.map(w => w.english.toLowerCase());
  const fi = order.indexOf(fromEnglish.toLowerCase());
  const ti = order.indexOf(toEnglish.toLowerCase());
  if (fi === -1 || ti === -1 || fi === ti) return;
  order.splice(fi, 1);
  order.splice(ti, 0, fromEnglish.toLowerCase());
  saveOrder(order);
  renderList();
}

function enableDragOnRows() {
  const rows = document.querySelectorAll('.word-row.edit-mode');

  rows.forEach(row => {
    row.setAttribute('draggable', 'true');

    row.addEventListener('dragstart', e => {
      dragEl = row;
      setTimeout(() => row.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(r => r.classList.remove('drag-over'));
      dragEl = null;
    });
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (dragEl && dragEl !== row) reorderWords(dragEl.dataset.english, row.dataset.english);
    });

    // Touch drag — only trigger from the handle
    const handle = row.querySelector('.drag-handle');
    if (handle) {
      handle.addEventListener('touchstart', e => {
        e.preventDefault();
        dragEl = row;
        row.classList.add('dragging');
      }, { passive: false });
    }
  });

  document.addEventListener('touchmove', onTouchMove, { passive: false });
  document.addEventListener('touchend', onTouchEnd);
}

function onTouchMove(e) {
  if (!dragEl) return;
  e.preventDefault();
  const touch = e.touches[0];
  const els = document.elementsFromPoint(touch.clientX, touch.clientY);
  const target = els.find(el => el.classList.contains('word-row') && el !== dragEl);
  if (touchDropTarget && touchDropTarget !== target) touchDropTarget.classList.remove('drag-over');
  touchDropTarget = target || null;
  if (touchDropTarget) touchDropTarget.classList.add('drag-over');
}

function onTouchEnd() {
  if (!dragEl) return;
  dragEl.classList.remove('dragging');
  if (touchDropTarget) {
    touchDropTarget.classList.remove('drag-over');
    reorderWords(dragEl.dataset.english, touchDropTarget.dataset.english);
  }
  document.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchend', onTouchEnd);
  dragEl = null;
  touchDropTarget = null;
}

//  List view
// ─────────────────────────────────────────────
let editMode = false;

function renderList(query) {
  const q         = (query !== undefined ? query : document.getElementById('search').value || '').toLowerCase().trim();
  const container = document.getElementById('word-list');
  const header    = document.getElementById('list-header');
  const words     = getSortedWords();
  const isDraggable = editMode && sortMode === 'default';

  if (editMode) {
    header.className = 'list-header edit-mode';
    header.innerHTML = '<span></span><span></span><span>Spanish</span><span>English</span><span>中文</span><span>日本語</span><span></span>';
  } else {
    header.className = 'list-header';
    header.innerHTML = '<span></span><span>Spanish</span><span>English</span><span>中文</span><span>日本語</span>';
  }

  const filtered = words.filter(w =>
    !q ||
    w.spanish.toLowerCase().includes(q) ||
    w.english.toLowerCase().includes(q) ||
    w.chinese?.includes(q) ||
    w.japanese?.includes(q)
  );

  if (!filtered.length) {
    container.innerHTML = '<div class="no-results">No words found 🔍</div>';
    return;
  }

  container.innerHTML = filtered.map(w => {
    const emoji = w.emoji || '📖';
    const ja    = w.japanese || '';
    if (editMode) {
      return `<div class="word-row edit-mode" data-english="${w.english}">
        <button class="btn-delete" data-english="${w.english}">×</button>
        <span class="col-emoji">${emoji}</span>
        <span class="col-es">${w.spanish}</span>
        <span class="col-en">${w.english}</span>
        <span class="col-zh">${w.chinese || ''}</span>
        <span class="col-ja">${ja}</span>
        <span class="drag-handle" title="Drag to reorder">≡</span>
      </div>`;
    }
    return `<div class="word-row" data-english="${w.english}">
      <span class="col-emoji">${emoji}</span>
      <span class="col-es">${w.spanish}</span>
      <span class="col-en">${w.english}</span>
      <span class="col-zh">${w.chinese || ''}</span>
      <span class="col-ja">${ja}</span>
    </div>`;
  }).join('');

  if (editMode) {
    container.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm(`Delete "${btn.dataset.english}"?`)) { deleteWord(btn.dataset.english); renderList(); }
      });
    });
    if (isDraggable) enableDragOnRows();
  } else {
    container.querySelectorAll('.word-row').forEach(row => {
      row.addEventListener('click', () => {
        const w = getSortedWords().find(x => x.english === row.dataset.english);
        if (w) showCard(w);
      });
    });
  }
}

function toggleEditMode() {
  editMode = !editMode;
  const btn     = document.getElementById('btn-edit-toggle');
  const actions = document.getElementById('edit-actions');
  btn.textContent = editMode ? 'Done' : 'Edit';
  btn.classList.toggle('active', editMode);
  actions.style.display = editMode ? 'flex' : 'none';
  document.getElementById('search').disabled = editMode;
  renderList();
}

let current = null;

function showCard(word) {
  current = word;
  document.getElementById('card-spanish').textContent = word.spanish;
  document.getElementById('card-emoji').textContent   = word.emoji || '📖';

  document.getElementById('text-en').innerHTML =
    `<span class="def-word">${word.english}</span>${word.definition || ''}`;
  document.getElementById('text-zh').innerHTML =
    `<span class="def-word">${word.chinese || ''}</span>`;
  document.getElementById('text-ja').innerHTML =
    `<span class="def-word">${word.japanese || ''}</span>`;

  ['panel-en','panel-zh','panel-ja'].forEach(id => document.getElementById(id).classList.remove('active'));
  ['btn-toggle-en','btn-toggle-zh','btn-toggle-ja'].forEach(id => document.getElementById(id).classList.remove('on'));
  document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
  speechSynthesis.cancel();

  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-card').style.display = 'flex';
}

function showList() {
  speechSynthesis.cancel();
  document.querySelectorAll('.mouth-btn').forEach(b => b.classList.remove('speaking'));
  document.getElementById('view-card').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
}

function togglePanel(panelId, btnId, others) {
  const isOn = document.getElementById(panelId).classList.contains('active');
  others.forEach(([p, b]) => { document.getElementById(p).classList.remove('active'); document.getElementById(b).classList.remove('on'); });
  document.getElementById(panelId).classList.toggle('active', !isOn);
  document.getElementById(btnId).classList.toggle('on', !isOn);
}

let pendingAudioUrl = '';

function showAddView() {
  ['input-english','input-spanish','input-chinese','input-japanese','input-definition','input-emoji']
    .forEach(id => { const el = document.getElementById(id); el.value = ''; el.classList.remove('auto-filled','error'); });
  const status = document.getElementById('add-status');
  status.textContent = '';
  status.className = 'status-msg';
  pendingAudioUrl = '';
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-add').style.display  = 'flex';
  setTimeout(() => document.getElementById('input-english').focus(), 100);
}

function hideAddView() {
  document.getElementById('view-add').style.display  = 'none';
  document.getElementById('view-list').style.display = 'block';
}

async function doLookup() {
  const english = document.getElementById('input-english').value.trim();
  if (!english) { document.getElementById('input-english').classList.add('error'); return; }
  document.getElementById('input-english').classList.remove('error');

  const btn = document.getElementById('btn-lookup');
  const status = document.getElementById('add-status');
  btn.disabled = true; btn.textContent = '…';
  status.textContent = 'Looking up…'; status.className = 'status-msg';

  try {
    const [spanish, chinese, japanese, dict] = await Promise.all([
      translateWord(english, 'es'),
      translateWord(english, 'zh-CN'),
      translateWord(english, 'ja'),
      lookupDictionary(english),
    ]);

    document.getElementById('input-spanish').value    = spanish;
    document.getElementById('input-chinese').value    = chinese;
    document.getElementById('input-japanese').value   = japanese;
    document.getElementById('input-definition').value = dict.definition;
    pendingAudioUrl = dict.audioUrl;

    ['input-spanish','input-chinese','input-japanese'].forEach(id => document.getElementById(id).classList.add('auto-filled'));
    if (dict.definition) document.getElementById('input-definition').classList.add('auto-filled');

    status.textContent = '✓ Done! Review and adjust if needed.';
    status.className   = 'status-msg ok';
  } catch {
    status.textContent = '✗ Lookup failed — check your connection or fill in manually.';
    status.className   = 'status-msg error';
  } finally {
    btn.disabled = false; btn.textContent = 'Look Up';
  }
}

function doSaveWord() {
  const get = id => document.getElementById(id).value.trim();
  const english    = get('input-english');
  const spanish    = get('input-spanish');
  const chinese    = get('input-chinese');
  const japanese   = get('input-japanese');
  const definition = get('input-definition');
  const emoji      = get('input-emoji');

  const status = document.getElementById('add-status');
  if (!english || !spanish || !chinese) {
    status.textContent = 'English, Spanish, and Chinese are required.';
    status.className   = 'status-msg error';
    return;
  }

  saveAddedWord({ english, spanish, chinese, japanese, definition, emoji, audio_en_url: pendingAudioUrl });
  hideAddView();
  renderList();
}

function exportDataJs() {
  const words   = getAllWords();
  const content = `// Auto-generated — do not edit by hand\nconst WORD_DATA = ${JSON.stringify(words, null, 2)};\n`;
  const blob    = new Blob([content], { type: 'application/javascript' });
  const url     = URL.createObjectURL(blob);
  Object.assign(document.createElement('a'), { href: url, download: 'data.js' }).click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

(function initEmojiPicker() {
  const wrap   = document.getElementById('ep-wrap');
  const catBar = document.getElementById('ep-cats');
  const grid   = document.getElementById('ep-grid');
  const search = document.getElementById('ep-search');

  catBar.innerHTML = [['all','🌐'], ...Object.keys(EP.data).map(k => [k, k])].map(([k, l]) =>
    `<button class="ep-cat${k==='all'?' active':''}" data-cat="${k}">${l}</button>`
  ).join('');

  function allEntries() { return Object.values(EP.data).flat(); }

  function renderGrid() {
    const q    = search.value.toLowerCase().trim();
    const pool = EP.cat === 'all' ? allEntries() : (EP.data[EP.cat] || []);
    const list = q ? allEntries().filter(([, k]) => k.includes(q)) : pool;
    grid.innerHTML = list.length
      ? list.map(([e]) => `<span class="ep-emoji" data-e="${e}">${e}</span>`).join('')
      : '<div class="ep-empty">No results</div>';
  }

  catBar.addEventListener('click', e => {
    const btn = e.target.closest('.ep-cat');
    if (!btn) return;
    EP.cat = btn.dataset.cat;
    catBar.querySelectorAll('.ep-cat').forEach(b => b.classList.toggle('active', b === btn));
    search.value = '';
    renderGrid();
  });

  grid.addEventListener('click', e => {
    const el = e.target.closest('.ep-emoji');
    if (!el) return;
    document.getElementById('input-emoji').value = el.dataset.e;
    wrap.classList.remove('open');
  });

  search.addEventListener('input', renderGrid);

  document.getElementById('btn-emoji-pick').addEventListener('click', e => {
    e.stopPropagation();
    const opening = !wrap.classList.contains('open');
    wrap.classList.toggle('open');
    if (opening) {
      search.value = ''; EP.cat = 'all';
      catBar.querySelectorAll('.ep-cat').forEach((b, i) => b.classList.toggle('active', i === 0));
      renderGrid();
      setTimeout(() => search.focus(), 50);
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#ep-wrap') && !e.target.closest('#btn-emoji-pick')) wrap.classList.remove('open');
  });

  renderGrid();
})();
